# input
batch: 500
input_length: 0.32
input_gap_mean: 0.6
input_gap_std: 0.05
arrival_rate_ppm: 180

# upstream
L_upstream: 3.0
j_u_max: 0.0
v_u_max: 1.8
a_u_max: 0.0

# buffer
jmax: 100.0
Vmax: 3.0
Amax: 8.5
beta: 0.
gamma: 0.

# solver: quintic
solver: scurve
L_buffer: 3
n_buffer_seg: 6
eta_v: 1.8 # kinematic headroom: v^{BR} = eta_v * v_d

v_min: 0.0 # planner-imposed velocity floor (m/s); 0 means no floor
start_margin: 1 # the fraction of the input length, that must be on the buffer, before buffer control may commence.
end_margin: 0.0

# registrar
L_registrar: 1.0
n_reg_seg: 1

# downstream
L_downstream: 2.0
eta_s: 1.5 # slot_length = eta_s * input_length
eta_r: 1.1 # slot_rate   = eta_r * arrival_rate_ppm
