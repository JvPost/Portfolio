# input
batch: 100
input_length: 0.32
input_gap_mean: 0.6
input_gap_std: 0.00
input_gap_rho: 0.0
arrival_rate_ppm: 150

# upstream
upstream_control: acc
L_upstream: 2.0
j_u_max: 100.0
v_u_max: 3.5
a_u_max: 0.05

# buffer
jmax: 100.0
Vmax: 3.5
Amax: 8.5
beta: 0.0
gamma: 0.0

solver: ruckig
L_buffer: 3.0
n_buffer_seg: 8
eta_v: 2.2 # kinematic headroom: v^{BR} = eta_v * v_d

v_min: 0.0 # planner-imposed velocity floor (m/s); 0 means no floor
start_margin: 1 # the fraction of the input length, that must be on the buffer, before buffer control may commence.
end_margin: 0.0

# registrar
L_registrar: 1.5
n_reg_seg: 1

# downstream
L_downstream: 2.0
eta_s: 1.5 # slot_length = eta_s * input_length
eta_r: 1.05 # slot_rate   = eta_r * arrival_rate_ppm

# \pi^S bounds
a_max_sync: 25.0
j_max_sync: 300
