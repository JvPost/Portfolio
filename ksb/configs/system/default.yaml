# input
batch: 100
input_length: 0.32
input_gap_mean: 0.6
input_gap_std: 0.10
input_gap_rho: 0.0
arrival_rate_ppm: 150

# Upstream
L_upstream: 1.0

# Conditioning
conditioning_control: acc
L_conditioning: 3.0
j_c_max: 100.0
v_c_max: 3.0
a_c_max: 8.5

# buffer
jmax: 100.0
Vmax: 3.5
Amax: 8.5

beta: 0.0
gamma: 0.0

solver: ruckig
L_buffer: 2.5
n_buffer_seg: 7

v_min: 0.0 # planner-imposed velocity floor (m/s); 0 means no floor
start_margin: 1 # the fraction of the input length, that must be on the buffer, before buffer control may commence.
end_margin: 0.0

# downstream
L_downstream: 2.0
eta_s: 2. # slot_length = eta_s * input_length
eta_r: 2.0 # slot_rate   = eta_r * arrival_rate_ppm

# \pi^S bounds
a_max_sync: 25.0
j_max_sync: 300
