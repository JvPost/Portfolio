# Optimizer config — Track A (whole-line CMA-ES)
# Select with: python run_optimize.py --opt-config default

# N^B sweep range
N_min: 5
N_max: 12

# Loss weights
lambda_U: 1.00 # utilization penalty
lambda_L: 0.50 # buffer length penalty
lambda_T: 1.00 # throughput ratio penalty
lambda_N: 0.10 # outer N^B penalty (discourages over-segmentation)

# CMA-ES settings
popsize: 20 # population per generation
restarts: 4 # restarts per N^B
n_seeds: 4 # simulation seeds per loss evaluation
max_iter: 100 # max CMA-ES generations per restart
